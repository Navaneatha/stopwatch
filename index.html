<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Stopwatch</h1>

        <div class="time" id="display">
            00:00:00
        </div>

        <div class="buttons">
            <button id="startStop">Start</button>
            <button id="reset">Reset</button>
            <button id="lap">Lap</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Lap Time</th>
                    <th>Total Time</th>
                </tr>
            </thead>
            <tbody id="lapsBody">
            </tbody>
        </table>

    </div>

    <script src="script.js"></script>
</body>
</html>
